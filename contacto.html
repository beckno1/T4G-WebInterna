<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contacto - Think4good</title>
    <link rel="stylesheet" href="estilocontacto.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <header>
        <div class="logo-container">
            <a href="index.html"><img src="https://cdn.glitch.global/7053447f-2509-4e39-9176-28733a97b57a/logo.png?v=1736294773449" alt="Think4good Logo"></a>
        </div>
        <nav>
            <a href="index.html#inicio">Inicio</a>
            <a href="index.html#servicios">Servicios</a>
            <a href="index.html#nosotros">Nosotros</a>
            <a href="index.html#testimonios">Testimonios</a>
            <a href="#">Contacto</a>
        </nav>
    </header>

    <section id="contacto" class="section">
        <div class="contacto-container">
            <h2>Contacto</h2>
            <p>¿Tienes alguna consulta o deseas comunicarte con nosotros? Llena el formulario o utiliza nuestras redes sociales para ponerte en contacto.</p>
            <form>
                <label for="nombre">Nombre:</label>
                <input type="text" id="nombre" name="nombre" placeholder="Ingresa tu nombre" required>

                <label for="email">Correo Electrónico:</label>
                <input type="email" id="email" name="email" placeholder="Ingresa tu correo electrónico" required>

                <label for="mensaje">Mensaje:</label>
                <textarea id="mensaje" name="mensaje" placeholder="Escribe tu mensaje aquí" required></textarea>

                <button type="submit">Enviar</button>
            </form>
        </div>
    </section>

    <footer>
        <p>&copy; 2025 Think4good. Todos los derechos reservados.</p>
        <div class="social-media">
            <a href="https://www.facebook.com/t4gthinkforgood" target="_blank" class="social-icon">
                <img src="https://upload.wikimedia.org/wikipedia/commons/5/51/Facebook_f_logo_%282019%29.svg" alt="Facebook">
            </a>
            <a href="https://www.tiktok.com/@t4g_pe" target="_blank" class="social-icon">
                <img src="https://cdn.glitch.global/7053447f-2509-4e39-9176-28733a97b57a/tiktok.png?v=1736302431300" alt="TikTok">
            </a>
            <a href="https://www.instagram.com/t4g_pe" target="_blank" class="social-icon">
                <img src="https://upload.wikimedia.org/wikipedia/commons/a/a5/Instagram_icon.png" alt="Instagram">
            </a>
            <a href="https://www.linkedin.com/company/think4good" target="_blank" class="social-icon">
                <img src="https://cdn.glitch.global/7053447f-2509-4e39-9176-28733a97b57a/linkedin.png?v=1736302425871" alt="LinkedIn">
            </a>
        </div>
    </footer>
</body>
</html>
