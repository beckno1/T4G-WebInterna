<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Think4good - Soluciones Tecnológicas</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Incluir Font Awesome para los íconos -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <!-- Video de fondo -->
    <video class="video-background" autoplay muted loop>
        <source src="https://cdn.glitch.global/7053447f-2509-4e39-9176-28733a97b57a/fondo.mp4?v=1736295041783" type="video/mp4">
        Tu navegador no soporta videos HTML5.
    </video>

    <header>
        <div class="logo-container">
            <img src="https://cdn.glitch.global/7053447f-2509-4e39-9176-28733a97b57a/logo.png?v=1736294773449" alt="Think4good Logo">
        </div>
        <nav>
            <a href="#inicio">Inicio</a>
            <a href="#servicios">Servicios</a>
            <a href="#nosotros">Nosotros</a>
            <a href="#testimonios">Testimonios</a>
            <a href="#contacto">Contacto</a>
        </nav>
    </header>

    <!-- Slider de imágenes colocado debajo del encabezado -->
    <section id="slider" class="section">
        <div class="slider-container">
            <div class="slider">
                <img src="https://cdn.glitch.global/7053447f-2509-4e39-9176-28733a97b57a/ai-generated-8885061.jpg?v=1736299828088" alt="Imagen 1">
                <img src="https://cdn.glitch.global/7053447f-2509-4e39-9176-28733a97b57a/data-5933101.jpg?v=1736299831840" alt="Imagen 2">
                <img src="https://cdn.glitch.global/7053447f-2509-4e39-9176-28733a97b57a/internet-3484137.jpg?v=1736299835762" alt="Imagen 3">
            </div>
        </div>
        <!-- Botones de control fuera del slider -->
        <div class="slider-buttons">
            <button id="prev" class="slider-button"><i class="fas fa-chevron-left"></i></button>
            <button id="next" class="slider-button"><i class="fas fa-chevron-right"></i></button>
        </div>
    </section>

    <!-- Rectángulo debajo del slider -->
    <section id="quienes-somos" class="section">
        <div class="quienes-somos-box">
            <h2>¿Quiénes somos?</h2>
            <p>Somos una empresa comprometida con la innovación y la excelencia, brindando soluciones tecnológicas que impulsan el crecimiento y la eficiencia de nuestros clientes.</p>
        </div>
    </section>

    <footer>
        <p>&copy; 2025 Think4good. Todos los derechos reservados.</p>
    </footer>

    <script>
        let currentIndex = 0;
        const slides = document.querySelectorAll('.slider img');
        const totalSlides = slides.length;
        
        function moveToNextSlide() {
            currentIndex = (currentIndex + 1) % totalSlides; // Calcula el siguiente índice
            const slider = document.querySelector('.slider');
            slider.style.transform = `translateX(-${currentIndex * 100}%)`; // Mueve el slider a la izquierda
        }

        function moveToPrevSlide() {
            currentIndex = (currentIndex - 1 + totalSlides) % totalSlides; // Calcula el índice anterior
            const slider = document.querySelector('.slider');
            slider.style.transform = `translateX(-${currentIndex * 100}%)`; // Mueve el slider a la izquierda
        }

        // Configura el intervalo para cambiar las imágenes cada 10 segundos (10000 ms)
        setInterval(moveToNextSlide, 10000);

        // Event listeners para los botones de "Siguiente" y "Anterior"
        document.getElementById('next').addEventListener('click', moveToNextSlide);
        document.getElementById('prev').addEventListener('click', moveToPrevSlide);
    </script>
</body>
</html>
